services:

  # ─── Go API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/otaviano/braza-sso/api:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      cassandra:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - internal

  # ─── React Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/otaviano/braza-sso/frontend:latest
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - internal

  # ─── Caddy (reverse proxy + TLS) ──────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend
    networks:
      - internal

  # ─── Cassandra ────────────────────────────────────────────────────────────
  cassandra:
    image: cassandra:4.1
    restart: unless-stopped
    environment:
      CASSANDRA_CLUSTER_NAME: braza-sso
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_AUTHENTICATOR: PasswordAuthenticator
      CASSANDRA_AUTHORIZER: CassandraAuthorizer
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q 'UN'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - internal

  # ─── Cassandra password init ──────────────────────────────────────────────
  cassandra-init:
    image: cassandra:4.1
    restart: "no"
    depends_on:
      cassandra:
        condition: service_healthy
    environment:
      CASSANDRA_PASSWORD: ${CASSANDRA_PASSWORD}
    entrypoint:
      - bash
      - -c
      - |
        set -e
        HOST="cassandra"
        DEFAULT_PASSWORD="cassandra"
        TARGET="$$CASSANDRA_PASSWORD"
        if [ -z "$$TARGET" ]; then echo "CASSANDRA_PASSWORD not set"; exit 0; fi
        if [ "$$TARGET" = "$$DEFAULT_PASSWORD" ]; then echo "Password matches default, skipping"; exit 0; fi
        echo "Waiting for Cassandra auth subsystem..."
        until cqlsh "$$HOST" -u cassandra -p "$$DEFAULT_PASSWORD" -e "LIST ROLES" >/dev/null 2>&1; do
          if cqlsh "$$HOST" -u cassandra -p "$$TARGET" -e "LIST ROLES" >/dev/null 2>&1; then
            echo "Password already updated"; exit 0
          fi
          sleep 5
        done
        echo "Changing default superuser password..."
        cqlsh "$$HOST" -u cassandra -p "$$DEFAULT_PASSWORD" -e "ALTER ROLE cassandra WITH PASSWORD = '$$TARGET'"
        echo "Cassandra password updated successfully"
    networks:
      - internal

  # ─── Mailpit (local SMTP + web UI) ───────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
    networks:
      - internal

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

volumes:
  cassandra_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
