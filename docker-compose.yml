services:

  # ─── Go API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/otaviano/braza-sso/api:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      cassandra-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - internal

  # ─── React Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/otaviano/braza-sso/frontend:latest
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - internal

  # ─── Caddy (reverse proxy + TLS) ──────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend
    networks:
      - internal

  # ─── Cassandra ────────────────────────────────────────────────────────────
  cassandra:
    image: cassandra:4.1
    restart: unless-stopped
    environment:
      CASSANDRA_CLUSTER_NAME: braza-sso
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_AUTHENTICATOR: PasswordAuthenticator
      CASSANDRA_AUTHORIZER: CassandraAuthorizer
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q 'UN'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - internal

  # ─── Cassandra password init ──────────────────────────────────────────────
  cassandra-init:
    image: cassandra:4.1
    restart: "no"
    depends_on:
      cassandra:
        condition: service_healthy
    environment:
      CASSANDRA_PASSWORD: ${CASSANDRA_PASSWORD}
    entrypoint:
      - bash
      - -c
      - |
        set -e
        HOST="cassandra"
        DEFAULT_PASSWORD="cassandra"
        TARGET="$$CASSANDRA_PASSWORD"
        if [ -z "$$TARGET" ]; then echo "CASSANDRA_PASSWORD not set"; exit 0; fi
        if [ "$$TARGET" = "$$DEFAULT_PASSWORD" ]; then echo "Password matches default, skipping"; exit 0; fi
        echo "Waiting for Cassandra auth subsystem..."
        until cqlsh "$$HOST" -u cassandra -p "$$DEFAULT_PASSWORD" -e "LIST ROLES" >/dev/null 2>&1; do
          if cqlsh "$$HOST" -u cassandra -p "$$TARGET" -e "LIST ROLES" >/dev/null 2>&1; then
            echo "Password already updated"; exit 0
          fi
          sleep 5
        done
        echo "Changing default superuser password..."
        cqlsh "$$HOST" -u cassandra -p "$$DEFAULT_PASSWORD" -e "ALTER ROLE cassandra WITH PASSWORD = '$$TARGET'"
        echo "Cassandra password updated successfully"
    networks:
      - internal

  # ─── Cassandra schema migration ───────────────────────────────────────────
  cassandra-migrate:
    image: cassandra:4.1
    restart: "no"
    depends_on:
      cassandra:
        condition: service_healthy
    environment:
      CASSANDRA_PASSWORD: ${CASSANDRA_PASSWORD}
      CASSANDRA_USERNAME: ${CASSANDRA_USERNAME:-cassandra}
    entrypoint:
      - bash
      - -c
      - |
        set -e
        HOST="cassandra"
        USER="$$CASSANDRA_USERNAME"
        PASS="$$CASSANDRA_PASSWORD"
        echo "Waiting for Cassandra to accept connections..."
        until cqlsh "$$HOST" -u "$$USER" -p "$$PASS" -e "DESCRIBE CLUSTER" >/dev/null 2>&1; do
          sleep 5
        done
        echo "Applying schema migrations..."
        cqlsh "$$HOST" -u "$$USER" -p "$$PASS" <<'CQL'
        CREATE KEYSPACE IF NOT EXISTS braza_sso
          WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};
        USE braza_sso;
        CREATE TABLE IF NOT EXISTS users (
          user_id         UUID PRIMARY KEY,
          email           TEXT,
          password_hash   TEXT,
          email_verified  BOOLEAN,
          totp_enabled    BOOLEAN,
          totp_secret     TEXT,
          locked_until    TIMESTAMP,
          failed_attempts INT,
          created_at      TIMESTAMP,
          updated_at      TIMESTAMP
        );
        CREATE TABLE IF NOT EXISTS users_by_email (
          email   TEXT PRIMARY KEY,
          user_id UUID
        );
        CREATE TABLE IF NOT EXISTS federated_identities (
          user_id          UUID,
          provider         TEXT,
          provider_user_id TEXT,
          email            TEXT,
          linked_at        TIMESTAMP,
          PRIMARY KEY (user_id, provider)
        );
        CREATE TABLE IF NOT EXISTS user_recovery_codes (
          user_id    UUID,
          code_id    UUID,
          code_hash  TEXT,
          used       BOOLEAN,
          created_at TIMESTAMP,
          PRIMARY KEY (user_id, code_id)
        );
        CREATE TABLE IF NOT EXISTS oauth_clients (
          client_id                UUID PRIMARY KEY,
          client_secret_hash       TEXT,
          redirect_uris            LIST<TEXT>,
          scopes                   LIST<TEXT>,
          name                     TEXT,
          logo_url                 TEXT,
          backchannel_logout_uri   TEXT
        );
        CREATE TABLE IF NOT EXISTS user_consents (
          user_id    UUID,
          client_id  TEXT,
          scopes     LIST<TEXT>,
          granted_at TIMESTAMP,
          PRIMARY KEY (user_id, client_id)
        );
        CQL
        echo "Schema migrations applied successfully"
    networks:
      - internal

  # ─── Mailpit (local SMTP + web UI) ───────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
    networks:
      - internal

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

volumes:
  cassandra_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
