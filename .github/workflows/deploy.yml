name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml,Caddyfile"
          target: /opt/braza-sso

      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            # Clean up any stale deployments from old locations
            docker compose -f /docker/braza-sso/docker-compose.yml down 2>/dev/null || true
            rm -rf /docker/braza-sso

            cd /opt/braza-sso
            # Remove stale Caddyfile directory Docker may have auto-created when file was missing
            rm -f Caddyfile Caddyfile.* || true
            [ -d Caddyfile ] && rm -rf Caddyfile || true
            printenv GHCR_TOKEN | docker login ghcr.io -u ${{ secrets.VPS_USER }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
